<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leaderboard — Chess</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app" style="padding:20px; width:100%; max-width:none; margin:0; display:flex; flex-direction:column; align-items:stretch;">
    <div class="leaderboard-wrap" style="width:100%; max-width:720px; text-align:center;">
      <h1 style="text-align:center; margin-bottom:12px;">KingdomVR<BR>Chess Leaderboard</h1>
      <div style="display:flex; gap:8px; align-items:center; margin-bottom:12px; justify-content:center;">
        <span id="loading" style="color:#c9b79c; display:none;">Loading…</span>
      </div>

      <table id="board-table" style="width:100%; border-collapse:collapse; background:#fff; color:#111; border-radius:6px; overflow:hidden;">
      <thead style="background:#f4f2ee; text-align:left;">
        <tr>
          <th style="padding:8px 12px; width:48px">#</th>
          <th style="padding:8px 12px">Username</th>
          <th style="padding:8px 12px; width:120px">Points</th>
        </tr>
      </thead>
      <tbody id="board-body"></tbody>
    </table>

    </div>
  </div>

  <script src="/js/leaderboard.js"></script>
</body>
</html>
